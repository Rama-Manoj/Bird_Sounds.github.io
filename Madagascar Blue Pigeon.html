<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madagascar Blue Pigeon</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #333;
        }
        .container {
            padding: 20px;
            height: max-content;
            width: 90%;
            margin: auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }
        
        .container:hover {
            background-color: #f0f0f0;
        }

        h1, p {
            text-align: center;
        }
        img {
            display: block;
            margin: 0 auto;
            height: auto;
            border-radius: 8px;
            max-width: 75%;
            max-height: 360px;
            transition: box-shadow 0.3s ease-in-out;
        }
        
        img:hover {
            box-shadow: 0 0 10px rgba(0, 0, 0, 1);
        }

        audio {
            display: block;
            margin: 20px auto;
            position: relative;
            margin-right: 10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Madagascar Blue Pigeon</h1>
        <img src="https://i.pinimg.com/originals/a4/71/0a/a4710a1a840eed2385c137a82ceed908.jpg" alt="Madagascar Blue Pigeon">
        <p>The Madagascar Blue Pigeon is not native to Madagascar.</p>
        <p>However, pigeons and doves are known to inhabit various regions globally, contributing to ecological balance and seed dispersal.</p>
        <audio controls>
            <source src="./Madagascar Blue Pigeon.mp3" type="audio/mpeg">
        </audio>
    </div>
</body>
</html>
