<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madagascar Owl</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #333;
        }
        .container {
            padding: 20px;
            height: max-content;
            width: 90%;
            margin: auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .container:hover {
            background-color: #f0f0f0;
        }

        h1, p {
            text-align: center;
        }
        img {
            display: block;
            margin: 0 auto;
            height: auto;
            border-radius: 8px;
            max-width: 75%;
            max-height: 360px;
            transition: box-shadow 0.3s ease-in-out;
        }
        
        img:hover {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        audio {
            display: block;
            margin: 20px auto;
            position: relative;
            margin-right: 10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Madagascar Owl</h1>
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a0/Madagascan_owl_%28Asio_madagascariensis%29.jpg" alt="Madagascar Owl">
        <p>The Madagascar Owl is not native to Madagascar.</p>
        <p>Owls are fascinating birds found in various habitats around the world. While Madagascar has unique bird species, the presence of owls is not documented.</p>
        <audio controls>
            <source src="./Madagascar Owl.mp3" type="audio/mpeg">
        </audio>
    </div>
</body>
</html>
