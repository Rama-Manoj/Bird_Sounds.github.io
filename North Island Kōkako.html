<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>North Island Kōkako</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #333;
        }
        .container {
            padding: 20px;
            height: max-content;
            width: 90%;
            margin: auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .container:hover {
            background-color: #f0f0f0;
        }

        h1, p {
            text-align: center;
        }
        img {
            display: block;
            margin: 0 auto;
            height: auto;
            border-radius: 8px;
            max-width: 75%;
            max-height: 360px;
            transition: box-shadow 0.3s ease-in-out;
        }
        
        img:hover {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        audio {
            display: block;
            margin: 20px auto;
            position: relative;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>North Island Kōkako</h1>
        <img src="https://www.doc.govt.nz/thumbs/hero/contentassets/0369102a181344cab30467658b9606d8/kokako-david-cook-1920.jpg" alt="North Island Kōkako">
        <p>The North Island Kōkako is a forest bird native to New Zealand. It is known for its haunting call and distinctive blue wattles.</p>
        <p>Due to habitat loss and introduced predators, it is considered endangered. Conservation efforts are underway to protect and restore its habitat.</p>
        <audio controls>
            <source src="./North Island Kōkako.mp3" type="audio/mpeg">
        </audio>
    </div>
</body>
</html>
