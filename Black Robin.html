<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Robin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #333;
        }
        .container {
            padding: 20px;
            height: max-content;
            width: 90%;
            margin: auto;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        
        .container:hover {
            background-color: #f0f0f0;
        }

        h1, p {
            text-align: center;
        }
        img {
            display: block;
            margin: 0 auto;
            height: auto;
            border-radius: 8px;
            max-width: 75%;
            max-height: 360px;
            transition: box-shadow 0.3s ease-in-out;
        }
        
        img:hover {
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }

        audio {
            display: block;
            margin: 20px auto;
            position: relative;
            margin-right: 10px;
        }

    </style>
</head>
<body>
    <div class="container">
        <h1>Black Robin</h1>
        <img src="https://www.doc.govt.nz/thumbs/hero/contentassets/e2d052e58a524678834413ef47993150/chathams-island-black-robin-hero.jpg" alt="Black Robin">
        <p>The Black Robin is a species of bird endemic to the Chatham Islands of New Zealand.</p>
        <p>Once on the brink of extinction, conservation efforts saved the Black Robin, making it a symbol of successful species recovery.</p>
        <audio controls>
            <source src="./Black Robin.mp3" type="audio/mpeg">
        </audio>
    </div>
</body>
</html>
